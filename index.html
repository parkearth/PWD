<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>臺北市工務局處鼠類防治執行成果系統 v2.0</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#090d16">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #090d16; color: #e2e8f0; font-family: system-ui, -apple-system, sans-serif; }
        .glass-panel { background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(12px); border: 1px solid rgba(6, 182, 212, 0.2); }
        .neon-border { box-shadow: 0 0 15px rgba(6, 182, 212, 0.15); }
        .arrow-icon { transition: transform 0.3s ease; }
        .collapsed .arrow-icon { transform: rotate(-90deg); }
        /* Tab Bar 啟用狀態高亮 */
        .tab-active { color: #22d3ee !important; border-top: 2px solid #22d3ee; background: rgba(34, 211, 238, 0.1); }
    </style>
</head>
<body class="w-screen h-screen overflow-hidden flex flex-col items-center justify-start select-none">

    <div id="auth-container" class="absolute inset-0 flex items-center justify-center p-4 z-50 bg-[#090d16]">
        <div class="w-full max-w-md glass-panel p-6 rounded-2xl neon-border flex flex-col space-y-4">
            <div class="text-center">
                <h2 class="text-xl font-bold text-cyan-400 tracking-wider">大數據治理終端 v2.0</h2>
                <p class="text-xs text-slate-400 mt-1">請輸入公務憑證或瀏覽權限代碼</p>
            </div>
            <div class="space-y-3">
                <div>
                    <label class="text-xs text-slate-400 block mb-1">使用者帳號</label>
                    <input type="text" id="input-user" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-cyan-300 focus:outline-none focus:border-cyan-500" placeholder="如：admin 或公務憑證帳號">
                </div>
                <div>
                    <label class="text-xs text-slate-400 block mb-1">通關密碼</label>
                    <input type="password" id="input-pass" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-cyan-300 focus:outline-none focus:border-cyan-500" placeholder="請輸入密碼">
                </div>
                <button id="btn-login" class="w-full py-2.5 bg-gradient-to-r from-cyan-600 to-blue-600 font-bold rounded-lg text-sm active:scale-95 transition mt-2">安全登入</button>
            </div>
            <div id="auth-error" class="text-center text-xs text-red-400 hidden font-bold">⚠️ 驗證失敗：帳號不存在或密碼錯誤</div>
        </div>
    </div>

    <div id="app-wrapper" class="hidden flex-col w-full h-full max-w-6xl mx-auto relative">
        
        <div class="glass-panel p-4 m-4 rounded-xl flex justify-between items-center shrink-0">
            <div>
                <h1 class="text-md sm:text-lg font-bold text-cyan-400 truncate">鼠類防治成果系統</h1>
                <p class="text-[10px] text-slate-400">當前使用者：<span id="txt-user-identity" class="text-emerald-400 font-bold">-</span></p>
            </div>
            <button id="btn-logout" class="px-3 py-1.5 bg-slate-800 hover:bg-slate-700 border border-slate-600 text-slate-300 text-xs font-bold rounded-lg transition">登出</button>
        </div>

        <main class="flex-1 overflow-y-auto px-4 pb-20 space-y-4">
            
            <div id="page-dashboard" class="page-section space-y-4">
                <div class="glass-panel p-3 rounded-xl flex items-center justify-between">
                    <span class="text-xs text-slate-300 font-bold">📅 統計維度快切：</span>
                    <div class="flex gap-2 bg-slate-900 p-1 rounded-lg border border-slate-800">
                        <button id="range-week" class="px-4 py-1.5 bg-cyan-600 text-white text-xs font-bold rounded-md transition shadow-md">一鍵看週數據</button>
                        <button id="range-month" class="px-4 py-1.5 text-slate-400 hover:text-white text-xs font-bold rounded-md transition">一鍵看月數據</button>
                    </div>
                </div>

                <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                    <div class="glass-panel p-4 rounded-xl">
                        <div class="text-[10px] text-slate-400">🔍 每日巡查次數</div>
                        <div id="card-inspect" class="text-xl font-bold text-cyan-400 tracking-tight mt-1">0 <span class="text-xs text-slate-400 font-normal">次</span></div>
                    </div>
                    <div class="glass-panel p-4 rounded-xl">
                        <div class="text-[10px] text-slate-400">🗑️ 清理廢棄物</div>
                        <div id="card-waste" class="text-xl font-bold text-emerald-400 tracking-tight mt-1">0 <span class="text-xs text-slate-400 font-normal">噸</span></div>
                    </div>
                    <div class="glass-panel p-4 rounded-xl">
                        <div class="text-[10px] text-slate-400">🕳️ 填補鼠洞數</div>
                        <div id="card-holes" class="text-xl font-bold text-amber-400 tracking-tight mt-1">0 <span class="text-xs text-slate-400 font-normal">個</span></div>
                    </div>
                    <div class="glass-panel p-4 rounded-xl">
                        <div class="text-[10px] text-slate-400">🧪 消毒總面積</div>
                        <div id="card-area" class="text-xl font-bold text-purple-400 tracking-tight mt-1">0 <span class="text-xs text-slate-400 font-normal">㎡</span></div>
                    </div>
                </div>

                <div class="glass-panel rounded-xl overflow-hidden">
                    <div class="p-3 bg-slate-900/50 border-b border-slate-800 text-xs font-bold text-cyan-400 flex justify-between items-center">
                        <span>📌 工務局處分層成果清單 (<span id="txt-range-label">本週資料</span>)</span>
                    </div>
                    <div id="accordion-container" class="p-3 space-y-3 max-h-[400px] overflow-y-auto">
                        </div>
                </div>

                <div class="glass-panel p-4 rounded-xl flex flex-col md:flex-row items-center justify-between gap-3 border border-emerald-500/30">
                    <div class="flex items-center gap-2">
                        <span class="text-lg">📊</span>
                        <div>
                            <h3 class="text-xs font-bold text-emerald-400">公務報表匯出中心 (流水帳)</h3>
                            <p class="text-[10px] text-slate-400">一鍵產製最新 Excel/CSV 明細下載至本機</p>
                        </div>
                    </div>
                    <button id="btn-export-csv" class="w-full md:w-auto px-6 py-2 bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 text-white text-xs font-bold rounded-lg transition active:scale-95 shadow">📥 匯出歷史明細 (.csv)</button>
                </div>
            </div>

            <div id="page-history" class="page-section space-y-4 hidden">
                <div class="glass-panel p-4 rounded-xl space-y-3">
                    <div class="flex justify-between items-center border-b border-slate-800 pb-2">
                        <h3 class="text-xs font-bold text-cyan-400">📅 日期維度篩選器</h3>
                        <p class="text-[10px] text-slate-400">點擊月曆查看特定日期填報紀錄</p>
                    </div>
                    <input type="date" id="history-date-picker" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-cyan-300 focus:outline-none focus:border-cyan-500">
                </div>

                <div class="glass-panel rounded-xl overflow-hidden">
                    <div class="p-3 bg-slate-900/50 border-b border-slate-800 text-xs font-bold text-cyan-400">
                        <span>📋 當日流水帳明細</span>
                    </div>
                    <div class="overflow-x-auto max-h-[450px] overflow-y-auto">
                        <table class="w-full text-left text-xs border-collapse">
                            <thead class="bg-slate-900/40 text-slate-400 border-b border-slate-800 sticky top-0">
                                <tr>
                                    <th class="p-2.5">工程處</th>
                                    <th class="p-2.5">行政區</th>
                                    <th class="p-2.5">填報人</th>
                                    <th class="p-2.5 text-right">巡查</th>
                                    <th class="p-2.5 text-right">廢棄物</th>
                                    <th class="p-2.5 text-right">鼠洞</th>
                                    <th class="p-2.5 text-right">消毒(㎡)</th>
                                </tr>
                            </thead>
                            <tbody id="history-table-body" class="divide-y divide-slate-800/50 text-slate-300">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="page-admin" class="page-section space-y-4 hidden">
                <div class="glass-panel p-5 rounded-xl space-y-4 max-w-lg mx-auto mt-4">
                    <div class="flex justify-between items-center border-b border-slate-800 pb-2">
                        <h3 class="text-xs font-bold text-cyan-400">➕ 新增公務防治現勘數據</h3>
                        <span class="text-[11px] text-purple-300 bg-purple-950/60 px-2 py-0.5 rounded border border-purple-800">
                            填報人：<b id="txt-reporter-name">-</b> (<b id="txt-reporter-office">-</b>)
                        </span>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-[10px] text-slate-400 block mb-1">回報工程處室</label>
                            <select id="form-office" class="w-full bg-slate-950 border border-slate-800 rounded-lg p-2 text-xs text-slate-400 cursor-not-allowed" disabled>
                                <option value="工務局">工務局</option>
                                <option value="新工處">新工處</option>
                                <option value="水利處">水利處</option>
                                <option value="公園處">公園處</option>
                                <option value="衛工處">衛工處</option>
                                <option value="大地處">大地處</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[10px] text-slate-400 block mb-1">責任行政區</label>
                            <select id="form-district" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-xs text-white">
                                <option value="松山區">松山區</option>
                                <option value="信義區">信義區</option>
                                <option value="大安區">大安區</option>
                                <option value="中山區">中山區</option>
                                <option value="中正區">中正區</option>
                                <option value="大同區">大同區</option>
                                <option value="萬華區">萬華區</option>
                                <option value="文山區">文山區</option>
                                <option value="南港區">南港區</option>
                                <option value="內湖區">內湖區</option>
                                <option value="士林區">士林區</option>
                                <option value="北投區">北投區</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[10px] text-slate-400 block mb-1">每日巡查次數 (次)</label>
                            <input type="number" id="form-inspect" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-xs text-white" value="10">
                        </div>
                        <div>
                            <label class="text-[10px] text-slate-400 block mb-1">清理廢棄物 (噸)</label>
                            <input type="number" step="0.001" id="form-waste" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-xs text-white" value="0.05">
                        </div>
                        <div>
                            <label class="text-[10px] text-slate-400 block mb-1">填補鼠洞數 (個)</label>
                            <input type="number" id="form-holes" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-xs text-white" value="2">
                        </div>
                        <div>
                            <label class="text-[10px] text-slate-400 block mb-1">環境消毒面積 (㎡)</label>
                            <input type="number" id="form-area" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-xs text-white" value="500">
                        </div>
                    </div>
                    <button id="btn-submit-data" class="w-full py-2 bg-purple-600 hover:bg-purple-500 font-bold text-xs rounded-lg active:scale-95 transition">確認寫入流水帳庫</button>
                </div>
            </div>

        </main>

        <nav id="bottom-nav" class="fixed bottom-0 w-full max-w-6xl glass-panel border-t border-slate-700 flex justify-around items-center z-40 bg-[#090d16]">
            <button class="nav-tab flex-1 py-3 text-center text-xs font-bold text-slate-400 transition" data-target="dashboard">
                <span class="block text-lg mb-0.5">📊</span> 總覽
            </button>
            <button class="nav-tab flex-1 py-3 text-center text-xs font-bold text-slate-400 transition" data-target="history">
                <span class="block text-lg mb-0.5">📅</span> 查詢
            </button>
            <button id="tab-admin" class="nav-tab flex-1 py-3 text-center text-xs font-bold text-slate-400 transition hidden" data-target="admin">
                <span class="block text-lg mb-0.5">➕</span> 填報
            </button>
        </nav>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
